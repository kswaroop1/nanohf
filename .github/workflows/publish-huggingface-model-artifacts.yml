name: Publish Hugging Face B2 Download Link

on:
  workflow_dispatch:
    inputs:
      model:
        description: Single Hugging Face model id. Use @revision to pin a revision.
        required: true
        type: string
      include_patterns:
        description: Optional allow-list patterns, comma- or newline-separated.
        required: false
        type: string
      exclude_patterns:
        description: Optional deny-list patterns, comma- or newline-separated.
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-huggingface-artifacts.txt

      - name: Install helper dependencies
        run: python -m pip install -r scripts/requirements-huggingface-artifacts.txt

      - name: Upload selected model file to Backblaze B2
        id: publish
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_PUBLIC_BASE_URL: ${{ vars.B2_PUBLIC_BASE_URL }}
          B2_OBJECT_PREFIX: ${{ vars.B2_OBJECT_PREFIX }}
          MODEL: ${{ inputs.model }}
          INCLUDE_PATTERNS: ${{ inputs.include_patterns }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
        run: |
          python scripts/huggingface_artifacts.py publish \
            --model "$MODEL" \
            --destination-root "$RUNNER_TEMP/model-publish" \
            --include-patterns "$INCLUDE_PATTERNS" \
            --exclude-patterns "$EXCLUDE_PATTERNS"

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.publish.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.publish.outputs.release_title }}
          RELEASE_NOTES_PATH: ${{ steps.publish.outputs.release_notes_path }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_PATH"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_PATH"
          fi
