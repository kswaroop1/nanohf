name: Validate nanohf helper

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-huggingface-artifacts.txt

      - name: Install helper dependencies
        run: python -m pip install -r scripts/requirements-huggingface-artifacts.txt

      - name: Validate helper syntax
        run: python -m compileall scripts/huggingface_artifacts.py

      - name: Validate release mapping
        run: python scripts/huggingface_artifacts.py describe --model "tobil/qmd-query-expansion-1.7B-gguf"
