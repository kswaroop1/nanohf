name: Publish Hugging Face Release Asset

on:
  workflow_dispatch:
    inputs:
      model:
        description: Single Hugging Face model id. Use @revision to pin a revision.
        required: true
        type: string
      include_patterns:
        description: Optional allow-list patterns, comma- or newline-separated.
        required: false
        type: string
      exclude_patterns:
        description: Optional deny-list patterns, comma- or newline-separated.
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-huggingface-artifacts.txt

      - name: Install packaging dependency
        run: python -m pip install -r scripts/requirements-huggingface-artifacts.txt

      - name: Package model release zip
        id: package
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODEL: ${{ inputs.model }}
          INCLUDE_PATTERNS: ${{ inputs.include_patterns }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
        run: |
          python scripts/huggingface_artifacts.py package \
            --model "$MODEL" \
            --destination-root "$RUNNER_TEMP/model-package" \
            --include-patterns "$INCLUDE_PATTERNS" \
            --exclude-patterns "$EXCLUDE_PATTERNS"

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.package.outputs.release_title }}
          RELEASE_NOTES_PATH: ${{ steps.package.outputs.release_notes_path }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_PATH"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_PATH"
          fi

      - name: Remove old matching assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          ASSET_PREFIX: ${{ steps.package.outputs.asset_prefix }}
        run: |
          while IFS= read -r asset_name; do
            [ -z "$asset_name" ] && continue
            if [[ "$asset_name" == "$ASSET_PREFIX.zip" || "$asset_name" == "$ASSET_PREFIX.part"*.zip ]]; then
              gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
            fi
          done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          ASSET_DIR: ${{ steps.package.outputs.asset_dir }}
        run: |
          shopt -s nullglob
          assets=("$ASSET_DIR"/*.zip)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No zip assets were generated."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}"
